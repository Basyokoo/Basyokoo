name: Generate Stats Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats Card
        uses: soulteary/github-readme-stats-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: Basyokoo
          output: assets/stats.svg
          theme: tokyonight
          title_color: "4FC3F7"
          icon_color: "4FC3F7"
          bg_color: "0d1117"
          text_color: "ffffff"
          hide_border: true

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update stats cards"
          git push
