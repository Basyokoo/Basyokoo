name: Generate Stats Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import requests, os, json

          token = os.environ["GITHUB_TOKEN"]
          username = "Basyokoo"
          headers = {"Authorization": f"Bearer {token}"}

          # GraphQL query
          query = """
          query($login: String!) {
            user(login: $login) {
              name
              repositories(ownerAffiliations: OWNER, isFork: false, first: 100) {
                nodes {
                  stargazerCount
                  languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                    edges { size node { name color } }
                  }
                }
              }
              contributionsCollection {
                totalCommitContributions
                totalPullRequestContributions
                totalIssueContributions
              }
              followers { totalCount }
              pullRequests { totalCount }
              issues { totalCount }
            }
          }
          """

          r = requests.post(
            "https://api.github.com/graphql",
            json={"query": query, "variables": {"login": username}},
            headers=headers
          )
          data = r.json()["data"]["user"]

          commits = data["contributionsCollection"]["totalCommitContributions"]
          prs     = data["pullRequests"]["totalCount"]
          issues  = data["issues"]["totalCount"]
          stars   = sum(n["stargazerCount"] for n in data["repositories"]["nodes"])

          # Count languages
          lang_sizes = {}
          for repo in data["repositories"]["nodes"]:
            for edge in repo["languages"]["edges"]:
              name  = edge["node"]["name"]
              color = edge["node"]["color"] or "#858585"
              lang_sizes[name] = lang_sizes.get(name, {"size": 0, "color": color})
              lang_sizes[name]["size"] += edge["size"]

          total = sum(v["size"] for v in lang_sizes.values()) or 1
          top   = sorted(lang_sizes.items(), key=lambda x: -x[1]["size"])[:8]

          os.makedirs("assets", exist_ok=True)

          # ── STATS CARD ──────────────────────────────────────────
          stats_svg = f"""<svg width="495" height="195" viewBox="0 0 495 195"
            xmlns="http://www.w3.org/2000/svg">
            <style>
              .title {{ font: 600 17px 'Segoe UI',sans-serif; fill:#4FC3F7 }}
              .stat  {{ font: 400 14px 'Segoe UI',sans-serif; fill:#ffffff }}
              .label {{ font: 400 13px 'Segoe UI',sans-serif; fill:#aaaaaa }}
            </style>
            <rect width="495" height="195" rx="10" fill="#0d1117"/>
            <text x="25" y="35" class="title">📊 Basyoko's GitHub Stats</text>
            <!-- commits -->
            <text x="25"  y="80"  class="label">Total Commits</text>
            <text x="220" y="80"  class="stat">{commits}</text>
            <!-- PRs -->
            <text x="25"  y="108" class="label">Pull Requests</text>
            <text x="220" y="108" class="stat">{prs}</text>
            <!-- Issues -->
            <text x="25"  y="136" class="label">Issues Opened</text>
            <text x="220" y="136" class="stat">{issues}</text>
            <!-- Stars -->
            <text x="25"  y="164" class="label">Total Stars</text>
            <text x="220" y="164" class="stat">{stars}</text>
          </svg>"""

          with open("assets/stats.svg", "w") as f:
            f.write(stats_svg)

          # ── TOP LANGUAGES CARD ───────────────────────────────────
          bar_y   = 110
          bar_h   = 8
          bar_w   = 445
          bar_x   = 25

          # Color bar segments
          bar_segs = ""
          cx = bar_x
          for name, info in top:
            w = int(info["size"] / total * bar_w)
            if w < 1: continue
            bar_segs += f'<rect x="{cx}" y="{bar_y}" width="{w}" height="{bar_h}" rx="3" fill="{info["color"]}"/>'
            cx += w

          # Legend rows (2 columns)
          legend = ""
          for i, (name, info) in enumerate(top):
            col = i % 2
            row = i // 2
            lx  = 25  + col * 230
            ly  = 135 + row * 22
            pct = round(info["size"] / total * 100, 1)
            legend += f"""
              <circle cx="{lx+6}" cy="{ly}" r="5" fill="{info['color']}"/>
              <text x="{lx+16}" y="{ly+4}" class="label">{name}</text>
              <text x="{lx+160}" y="{ly+4}" class="pct">{pct}%</text>"""

          langs_svg = f"""<svg width="495" height="{135 + ((len(top)+1)//2)*22 + 15}"
            viewBox="0 0 495 {135 + ((len(top)+1)//2)*22 + 15}"
            xmlns="http://www.w3.org/2000/svg">
            <style>
              .title {{ font: 600 17px 'Segoe UI',sans-serif; fill:#4FC3F7 }}
              .label {{ font: 400 13px 'Segoe UI',sans-serif; fill:#aaaaaa }}
              .pct   {{ font: 600 13px 'Segoe UI',sans-serif; fill:#ffffff }}
            </style>
            <rect width="100%" height="100%" rx="10" fill="#0d1117"/>
            <text x="25" y="35" class="title">🌐 Most Used Languages</text>
            <rect x="25" y="55" width="445" height="1" fill="#21262d"/>
            <text x="25" y="90" class="label">Language distribution across public repositories</text>
            {bar_segs}
            {legend}
          </svg>"""

          with open("assets/langs.svg", "w") as f:
            f.write(langs_svg)

          print("✅ Stats SVGs generated successfully!")
          PYEOF

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
